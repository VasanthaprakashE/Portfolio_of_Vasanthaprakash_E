<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog post - Data analytics insights by Vasanthaprakash E">
    <title>Blog Post | Vasanthaprakash E</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    
    <!-- Compiled Tailwind CSS -->
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 font-['Inter']">
    
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white/95 dark:bg-gray-900/95 backdrop-blur-sm shadow-md z-50 transition-all duration-300">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                    V<span class="text-gray-900 dark:text-white">Prakash</span>
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html#home" class="nav-link text-gray-700 dark:text-gray-300 hover:text-blue-600">Home</a>
                    <a href="index.html#about" class="nav-link text-gray-700 dark:text-gray-300 hover:text-blue-600">About</a>
                    <a href="index.html#experience" class="nav-link text-gray-700 dark:text-gray-300 hover:text-blue-600">Experience</a>
                    <a href="index.html#projects" class="nav-link text-gray-700 dark:text-gray-300 hover:text-blue-600">Projects</a>
                    <a href="index.html#skills" class="nav-link text-gray-700 dark:text-gray-300 hover:text-blue-600">Skills</a>
                    <a href="blog.html" class="nav-link text-blue-600">Blog</a>
                    <a href="index.html#feedback" class="nav-link text-gray-700 dark:text-gray-300 hover:text-blue-600">Feedback</a>
                </div>
                <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 transition hover:scale-105">
                    <i class="fas fa-moon text-gray-700 dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:inline-block text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>
    
    <!-- Blog Post Content -->
    <article class="pt-32 pb-12">
        <div class="container mx-auto px-6 max-w-4xl" id="blogPostContent">
            <div class="text-center text-gray-500 dark:text-gray-400 py-8">
                <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
                <p>Loading blog post...</p>
            </div>
        </div>
    </article>
    
    <!-- Comments Section -->
    <section class="py-12 bg-gray-50 dark:bg-gray-800">
        <div class="container mx-auto px-6 max-w-4xl">
            <div class="bg-white dark:bg-gray-900 rounded-2xl p-8 shadow-lg">
                <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 flex items-center gap-2">
                    <i class="fas fa-comments text-blue-600"></i>
                    Comments
                </h3>
                
                <form id="blogCommentForm" class="space-y-4 mb-8">
                    <input type="hidden" id="blogPostId" value="">
                    <div class="grid md:grid-cols-2 gap-4">
                        <input type="text" id="blogCommentName" placeholder="Your Name *" required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:border-blue-600">
                        <input type="email" id="blogCommentEmail" placeholder="Your Email (optional)" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:border-blue-600">
                    </div>
                    <textarea id="blogCommentMessage" rows="3" placeholder="Share your thoughts on this article..." required class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:border-blue-600"></textarea>
                    <button type="submit" id="submitBlogCommentBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
                        <i class="fas fa-paper-plane mr-2"></i> Post Comment
                    </button>
                </form>
                
                <div id="blogCommentsList" class="space-y-4">
                    <div class="text-center text-gray-500 dark:text-gray-400 py-4">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p class="text-sm mt-2">Loading comments...</p>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-8">
                <a href="blog.html" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-700 font-semibold">
                    <i class="fas fa-arrow-left"></i> Back to all posts
                </a>
            </div>
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8">
        <div class="container mx-auto px-6 text-center">
            <p>&copy; <span id="currentYear"></span> Vasanthaprakash E. All rights reserved.</p>
        </div>
    </footer>
    
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="blog-posts.js"></script>
    <script src="blog-comments.js"></script>
    <script src="script.js"></script>
</body>
</html>
